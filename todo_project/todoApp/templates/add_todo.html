<!DOCTYPE html>
<html>
<head>
    <title>Add Todo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
      .heading {
        font-size: 24px;
        text-align: center;
        padding: 10px;
      }

      .input {
        padding: 10px;
        margin: 10px;
        border-radius: 10px;
        border: 1px solid;
      }
      form {
        display: grid;
        align-items: center;
        grid-template-columns: 300px 100px;
      }

      #button {
        background-color: green;
        color: white;
        border: none;
        border-radius: 10px;
        height: 50px;
      }

      .change-page {
        color: black;
        text-decoration: none;
        margin: 20px;
      }

      .change-page.active {
        background-color: blue;
      }

      .change-page.hover {
        background-color: darkgrey;
      }
    </style>
</head>
<body>
    <h1 class="heading">Add a New Todo</h1>
    <form method="POST">
        {% csrf_token %}
        <input class="input" type="text" name="title" placeholder="Enter todo title" required>
        <button id="button" type="submit">Add</button>
    </form>
    <a class="change-page" href="{% url 'todo_list' %}">Back to Todo List</a>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
